name: Build & Release APK

# Builds the offline-first RPG_me Android app on GitHub's runners (no local
# Flutter toolchain needed) and attaches the APK to a GitHub Release.
#
# Trigger by pushing a tag like `app-v0.1.0`, or run manually from the
# Actions tab (workflow_dispatch).

# A push to the feature branch runs the build using the workflow file in that
# same branch (GitHub runs push-triggered workflows from the pushed ref, not
# only from the default branch). The Release is created by the runner's token
# via the GitHub API — it does NOT push a git tag, so it works even where tag
# pushes are restricted.
on:
  push:
    branches:
      - "dev"
      - "main"
      - "claude/life-metrics-octagon-chart-lstdz1"
    tags:
      - "app-v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 'true' when a release keystore secret is configured (enables consistent
      # signing so the app updates in place instead of needing a reinstall).
      HAS_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android scaffold
        working-directory: app
        run: |
          # flutter create regenerates the platform shells AND overwrites a few
          # template files — immediately restore RPG_me's versions from git and
          # drop the default counter-app widget test.
          flutter create --platforms=android --org com.rpgme --project-name rpg_me .
          git checkout -- pubspec.yaml lib/main.dart analysis_options.yaml
          rm -f test/widget_test.dart
          # Some plugins (file_picker -> flutter_plugin_android_lifecycle) now
          # require compileSdk 36. Force it on the app module AND on every
          # plugin subproject (plugins don't inherit the app's compileSdk here).
          for f in android/app/build.gradle android/app/build.gradle.kts; do
            [ -f "$f" ] || continue
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' "$f"
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/' "$f"
          done
          if [ -f android/build.gradle.kts ]; then
            cat >> android/build.gradle.kts <<'GRADLE'

          subprojects {
              fun forceSdk() {
                  extensions.findByName("android")?.withGroovyBuilder { "compileSdkVersion"(36) }
              }
              if (state.executed) forceSdk() else afterEvaluate { forceSdk() }
          }
          GRADLE
          fi
          if [ -f android/build.gradle ]; then
            cat >> android/build.gradle <<'GRADLE'

          subprojects {
              def forceSdk = {
                  if (it.hasProperty('android')) { it.android { compileSdkVersion 36 } }
              }
              if (project.state.executed) { forceSdk(project) }
              else { afterEvaluate { forceSdk(it) } }
          }
          GRADLE
          fi

      # Sign release builds with a stable key so the app updates in place (and
      # keeps its data) instead of needing an uninstall. Only runs when the
      # ANDROID_KEYSTORE_* secrets are set; otherwise the build is debug-signed.
      - name: Configure release signing
        if: ${{ env.HAS_SIGNING == 'true' }}
        working-directory: app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          python3 - <<'PY'
          p = 'android/app/build.gradle.kts'
          s = open(p).read()
          s = ('import java.util.Properties\n'
               'import java.io.FileInputStream\n\n') + s
          props = (
              'val keystoreProperties = Properties()\n'
              'val keystorePropertiesFile = rootProject.file("key.properties")\n'
              'if (keystorePropertiesFile.exists()) { '
              'keystoreProperties.load(FileInputStream(keystorePropertiesFile)) }\n\n')
          s = s.replace('android {', props + 'android {', 1)
          signing = (
              '\n    signingConfigs {\n'
              '        create("release") {\n'
              '            keyAlias = keystoreProperties["keyAlias"] as String?\n'
              '            keyPassword = keystoreProperties["keyPassword"] as String?\n'
              '            storeFile = keystoreProperties["storeFile"]?.let { file(it) }\n'
              '            storePassword = keystoreProperties["storePassword"] as String?\n'
              '        }\n'
              '    }\n')
          s = s.replace('android {', 'android {' + signing, 1)
          s = s.replace('signingConfigs.getByName("debug")',
                        'signingConfigs.getByName("release")')
          open(p, 'w').write(s)
          print('Release signing configured.')
          PY

      - name: Install packages
        working-directory: app
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: app
        run: dart run flutter_launcher_icons

      - name: Run tests
        working-directory: app
        run: flutter test
        continue-on-error: true # don't block the APK on a flaky/edge test

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - name: Stage artifact
        working-directory: app
        run: cp build/app/outputs/flutter-apk/app-release.apk rpg_me.apk

      # Always available from the run page, even if the Release step can't run
      # (e.g. token is read-only).
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpg_me-apk
          path: app/rpg_me.apk

      # Publish on a tag, on manual dispatch, or when the commit message says
      # [release]. softprops creates the tag (at this commit) + release via the
      # API using GITHUB_TOKEN.
      - name: Publish GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'app-v0.44.0' }}
          target_commitish: ${{ github.sha }}
          files: app/rpg_me.apk
          name: RPG_me ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'app-v0.44.0' }}
          body: |
            **Offline-first RPG_me — Android app.**

            Install it and just tap **Log** — it works fully offline, no backend
            or AWS required. Optionally add an API URL in Settings later to sync.

            - The APK is **debug-signed**: on your phone, enable
              *Install unknown apps* for your browser/file manager, then open it.
            - Data is stored on-device until you choose to sync.
